name: Continuous Integration (CI)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run dotnet build
        run: dotnet build -c Release -v minimal

      - name: Run dotnet tests
        run: dotnet test tests/Expose.Tests/Expose.Tests.fsproj -c Release -v minimal

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/expose-frontend/package-lock.json

      - name: Prepare frontend config
        run: cp config/~frontend.toml config/frontend.toml

      - name: Install frontend dependencies
        working-directory: src/expose-frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/expose-frontend
        run: npm run build

  ai-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/expose-ai/package-lock.json

      - name: Install AI service dependencies
        working-directory: src/expose-ai
        run: npm ci

      - name: Lint AI service
        working-directory: src/expose-ai
        run: npm run eslint

      - name: Build AI service
        working-directory: src/expose-ai
        run: npm run build

      - name: Test AI service
        working-directory: src/expose-ai
        run: npm test

  yfinance-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install yfinance service dependencies
        working-directory: src/expose-yfinance
        run: uv sync --all-extras --frozen

      - name: Lint yfinance service
        working-directory: src/expose-yfinance
        run: uv run ruff check src tests

      - name: Test yfinance service
        working-directory: src/expose-yfinance
        run: uv run pytest
